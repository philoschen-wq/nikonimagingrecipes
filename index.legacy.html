          if (points.length < 2) return '';
          let d = `M ${points[0].x} ${points[0].y} `;
          for (let i = 0; i < points.length - 1; i++) {
            const p0 = i === 0 ? points[0] : points[i - 1];
            const p1 = points[i];
            const p2 = points[i + 1];
            const p3 = i + 2 < points.length ? points[i + 2] : p2;
            const cp1x = p1.x + (p2.x - p0.x) / 6;
            const cp1y = p1.y + (p2.y - p0.y) / 6;
            const cp2x = p2.x - (p3.x - p1.x) / 6;
            const cp2y = p2.y - (p3.y - p1.y) / 6;
            d += `C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y} `;
          }

        // --- 漸進式載入圖片元件 (終極乾淨修復版) ---
        const ProgressiveImage = ({ src, alt, className, wrapperClass }) => {

          const imgRef = useRef(null);

          // 檢查圖片是否已經被瀏覽器快取秒殺載入
          useEffect(() => {
            if (imgRef.current && imgRef.current.complete) {
              if (imgRef.current.naturalWidth === 0) setHasError(true);
              setIsLoaded(true);
            }
          }, [src]);

          const finalWrapperClass = wrapperClass ? wrapperClass : "absolute inset-0";

          return (
            <div className={`${finalWrapperClass} overflow-hidden bg-[#1A1A1A]`}>
              {!isLoaded && !hasError && (
                <div className="absolute inset-0 animate-pulse bg-[#222]"></div>

                </div>
              )}
              <img 
                ref={imgRef}
                src={src} 
                alt={alt}
                loading="lazy"
                onLoad={() => setIsLoaded(true)}
                onError={() => {
                  setIsLoaded(true);
                  setHasError(true);
                }}
                className={`absolute inset-0 w-full h-full object-cover transition-all duration-700 ease-out ${
                  isLoaded && !hasError ? 'opacity-100 blur-0 scale-100' : 'opacity-0 blur-md scale-105'

        };

        // --- 許願池專屬的非同步 Formspree 表單元件 ---
        const WaitlistForm = ({ profileName }) => {
          const [email, setEmail] = useState('');
          const [status, setStatus] = useState('idle'); // idle, loading, success, error

          const handleSubmit = async (e) => {
            e.preventDefault();
            setStatus('loading');
            
            // 打包要傳送的資料
            const formData = new FormData();
            formData.append('email', email);
            formData.append('許願配方', profileName);
            formData.append('_subject', `有人許願了 ${profileName} 的原始檔！`);

            try {
              // ⚠️⚠️⚠️ 注意！請將下方的 YOUR_FORMSPREE_ID 換成你申請到的真實 ID ⚠️⚠️⚠️
              const response = await fetch("https://formspree.io/f/maqalllg", {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
              });
              
              if (response.ok) {
                setStatus('success');
                setEmail('');
              } else {
                setStatus('error');
              }
            } catch (error) {
              setStatus('error');
            }
          };

          if (status === 'success') {

          return (
            <div className="w-full flex flex-col items-center">

                  type="email" 
                  required

                  onChange={(e) => setEmail(e.target.value)}

                  type="submit" 
                  disabled={status === 'loading'}
                  className="flex items-center justify-center gap-2 bg-[#FFE100] text-black px-6 py-3 rounded-xl font-bold tracking-widest hover:bg-white transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed shrink-0 shadow-[0_10px_20px_rgba(255,225,0,0.15)] hover:shadow-[0_10px_25px_rgba(255,255,255,0.25)]"
                >
                  {status === 'loading' ? '傳送中...' : <><Bell className="w-4 h-4" /> 敲碗通知</>}
                </button>
              </form>
              {status === 'error' && (
                <div className="text-red-500 text-xs mt-2 w-full text-center">傳送失敗，請確認您的 ID 參數或網路連線。</div>
              )}

          );

        const App = () => {

          const allScenes = ['全部', ...Array.from(new Set(profiles.flatMap(p => p.scenes)))];

          // --- 收集所有照片以產生全域相片牆 (完美 CSS 瀑布流交錯演算法) ---
          const allPhotos = useMemo(() => {
            let photos = profiles.flatMap(profile => 
              (profile.gallery || []).map(photo => ({
                ...photo,
                profileName: profile.name,
                profileId: profile.id
              }))
            );
            
            for (let i = photos.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [photos[i], photos[j]] = [photos[j], photos[i]];
            }

            const verticalPhotos = photos.filter(p => p.isVertical);
            const horizontalPhotos = photos.filter(p => !p.isVertical);

            const cols = [[], [], []];
            const colHeights = [0, 0, 0]; 
            
            let vIdx = 0;
            let hIdx = 0;
            const total = photos.length;

            for (let i = 0; i < total; i++) {
              let minCol = 0;
              for (let c = 1; c < 3; c++) {
                if (colHeights[c] < colHeights[minCol]) minCol = c;
              }

              const rowIdx = cols[minCol].length;
              const wantH = (minCol + rowIdx) % 2 === 0;

              let selectedPhoto = null;
              let addedHeight = 0;

              if (wantH && hIdx < horizontalPhotos.length) {
                selectedPhoto = horizontalPhotos[hIdx++];
                addedHeight = 1; 
              } else if (!wantH && vIdx < verticalPhotos.length) {
                selectedPhoto = verticalPhotos[vIdx++];
                addedHeight = 2; 
              } else if (hIdx < horizontalPhotos.length) {
                selectedPhoto = horizontalPhotos[hIdx++];
                addedHeight = 1;
              } else if (vIdx < verticalPhotos.length) {
                selectedPhoto = verticalPhotos[vIdx++];
                addedHeight = 2;
              }

              if (selectedPhoto) {
                cols[minCol].push(selectedPhoto);
                colHeights[minCol] += addedHeight;
              }
            }

            return [...cols[0], ...cols[1], ...cols[2]];
          }, []);

          // --- 單一配方內頁的相片牆交錯演算法 (2欄版) ---
          const profilePhotos = useMemo(() => {
            if (!activeProfile || !activeProfile.gallery) return [];
            
            const photos = [...activeProfile.gallery];
            const verticalPhotos = photos.filter(p => p.isVertical);
            const horizontalPhotos = photos.filter(p => !p.isVertical);

            const cols = [[], []];
            const colHeights = [0, 0];
            
            let vIdx = 0;
            let hIdx = 0;
            const total = photos.length;

            for (let i = 0; i < total; i++) {
              let minCol = colHeights[0] <= colHeights[1] ? 0 : 1;
              const rowIdx = cols[minCol].length;
              const wantH = (minCol + rowIdx) % 2 === 0;

              let selectedPhoto = null;
              let addedHeight = 0;

              if (wantH && hIdx < horizontalPhotos.length) {
                selectedPhoto = horizontalPhotos[hIdx++];
                addedHeight = 1;
              } else if (!wantH && vIdx < verticalPhotos.length) {
                selectedPhoto = verticalPhotos[vIdx++];
                addedHeight = 2;
              } else if (hIdx < horizontalPhotos.length) {
                selectedPhoto = horizontalPhotos[hIdx++];
                addedHeight = 1;
              } else if (vIdx < verticalPhotos.length) {
                selectedPhoto = verticalPhotos[vIdx++];
                addedHeight = 2;
              }

              if (selectedPhoto) {
                cols[minCol].push(selectedPhoto);
                colHeights[minCol] += addedHeight;
              }
            }

            return [...cols[0], ...cols[1]];
          }, [activeProfile]);

          const safeUpdateURL = (hashValue) => {
            try {
              if (window.location.protocol === 'blob:' || window.location.protocol === 'data:') return;
              if (hashValue === null) {
                window.history.pushState('', document.title, window.location.pathname + window.location.search);
              } else {
                window.location.hash = hashValue;
              }
            } catch (error) {}
          };

          useEffect(() => {
            const handleHashChange = () => {
              try {
                const hash = window.location.hash.replace('#', '');
                if (hash === 'troubleshoot') {
                  setShowTroubleshoot(true);
                  setActiveProfile(null);
                } else if (hash) {
                  const profile = profiles.find(p => p.id === hash);
                  if (profile) {
                    setActiveProfile(profile);
                    setShowTroubleshoot(false);
                  }
                } else {
                  setActiveProfile(null);
                  setShowTroubleshoot(false);
                }
              } catch (error) {}
            };

            handleHashChange();
            window.addEventListener('hashchange', handleHashChange);
            return () => window.removeEventListener('hashchange', handleHashChange);
          }, []);

          // --- 解決換頁沒有回到最上方的問題 ---
          useEffect(() => {
            if (scrollRef.current) {
              scrollRef.current.scrollTop = 0;

            setIsSidebarOpen(false);

            setIsSidebarOpen(false);

            const url = window.location.href;

            textArea.value = url;

            textArea.select();
            try {

              setCopied(true);
              setTimeout(() => setCopied(false), 2000);

            document.body.removeChild(textArea);

            ? profiles 
            : profiles.filter(p => p.scenes.includes(activeFilter));

                    <button

                      title="顯示拍攝資訊"
                    >
                      <Info className="w-6 h-6" />
                    </button>
                    <button 
                      onClick={() => { setLightboxData(null); setShowExif(false); }} 
                      className="p-2.5 rounded-full bg-black/50 text-white/70 hover:text-white hover:bg-black/80 backdrop-blur-md border border-white/10 transition-colors"
                      title="關閉"
                    >
                      <X className="w-6 h-6" />
                    </button>
                  </div>
                  
                  {/* 滿版圖片 */}
                  <img 
                    src={lightboxData.full} 
                    alt="Gallery Enlarged" 
                    className={`max-w-[95vw] max-h-[90vh] object-contain shadow-2xl rounded-sm transition-all duration-500 ${showExif ? 'md:max-w-[calc(95vw-480px)] md:mr-[480px]' : ''}`}
                    onClick={(e) => e.stopPropagation()}
                  />

                  {/* 滑出的 EXIF 資訊面板 */}
                  {showExif && <ExifOverlay exif={lightboxData.exif} />}
                </div>
              )}

              {/* 科技感快門與觀景窗線條背景 */}
              <div className="fixed inset-0 pointer-events-none z-0 flex items-center justify-center overflow-hidden opacity-[0.03]">
                <svg viewBox="0 0 1000 1000" className="w-[150vw] h-[150vw] max-w-[1200px] max-h-[1200px] text-white" fill="none" stroke="currentColor">

                  <circle cx="500" cy="500" r="150" strokeWidth="1" strokeDasharray="10 20" />

              {/* 沉浸式 Z 浮水印背景 */}
