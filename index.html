<head>

    <style>
        /* 隱藏預設滾動條，採用高質感暗色系自訂滾動條 */

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="text-zinc-300 font-sans selection:bg-[#FFE100] selection:text-black overflow-hidden">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Lucide Icons 手工 SVG 轉換 ---
        const Icon = ({ path, className }) => (

        const Camera = (p) => <Icon {...p} path={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />;
        const Sliders = (p) => <Icon {...p} path={<><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></>} />;

        const Waves = (p) => <Icon {...p} path={<><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></>} />;

        const Zap = (p) => <Icon {...p} path={<><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></>} />;
        const Aperture = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="m14.31 8 5.74 9.94"/><path d="M9.69 8h11.48"/><path d="m7.38 12 5.74-9.94"/><path d="M9.69 16 3.95 6.06"/><path d="M14.31 16H2.83"/><path d="m16.62 12-5.74 9.94"/></>} />;

        const User = (p) => <Icon {...p} path={<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />;

        // --- Nikon 專屬品牌色 ---
        const NIKON_YELLOW = "#FFE100";

        // --- Nikon Z Series LOGO ---
        const ZLogo = ({ className }) => (
          <svg viewBox="0 0 120 120" className={className} fill="currentColor" preserveAspectRatio="xMidYMid meet">

        // --- 專屬手工繪製 SVG 向量圖示 (用於左側與右上角選單小圖) ---
        const Z8Icon = ({ className }) => (
          <svg viewBox="0 0 120 100" fill="none" xmlns="http://www.w3.org/2000/svg" className={className}>
            <path d="M15 35 C15 25 20 25 30 25 L40 25 C45 25 48 20 50 16 L53 10 C56 6 74 6 77 10 L80 16 C82 20 85 25 90 25 L100 25 C110 25 115 30 115 40 L115 80 C115 90 110 95 100 95 L30 95 C20 95 15 90 15 80 Z" fill="#1A1A1A" stroke="#444" strokeWidth="2"/>
            <path d="M50 16 C53 10 56 6 65 6 C74 6 77 10 80 16 C82 20 85 25 90 25 L40 25 C45 25 48 20 50 16 Z" fill="#0A0A0A" />
            <path d="M15 35 C15 25 20 25 30 25 L40 25 L40 95 L30 95 C20 95 15 90 15 80 Z" fill="#111" />
            <path d="M22 35 C18 50 18 60 22 70 L25 65 C22 55 22 40 25 38 Z" fill="#E60012" />
            <circle cx="65" cy="60" r="30" fill="#0A0A0A" stroke="#333" strokeWidth="2"/>
            <circle cx="65" cy="60" r="22" fill="#020617" stroke="#9CA3AF" strokeWidth="2"/>
            <line x1="95" y1="35" x2="105" y2="35" stroke="#FFE100" strokeWidth="2" strokeLinecap="round" />
          </svg>

        const ZfIcon = ({ className }) => (
          <svg viewBox="0 0 120 100" fill="none" xmlns="http://www.w3.org/2000/svg" className={className}>
            <g transform="matrix(0.85, 0, 0, 0.85, 9, 10)">
              <rect x="18" y="24" width="12" height="4" rx="1" fill="#555" />
              <rect x="35" y="20" width="16" height="8" rx="2" fill="#555" />
              <rect x="85" y="20" width="16" height="8" rx="2" fill="#555" />
              <circle cx="26" cy="25" r="3" fill="#E5E7EB" />
              <rect x="15" y="28" width="90" height="18" fill="#2A2A2A" stroke="#444" strokeWidth="1.5"/>
              <path d="M45 28 L52 14 L68 14 L75 28 Z" fill="#2A2A2A" stroke="#444" strokeWidth="1.5"/>

            </g>
          </svg>
        );

        // --- 高精細實機渲染 SVG 向量圖 (用於展示區塊) ---
        const Z8DetailedSvg = ({ className }) => (
          <svg viewBox="0 -10 300 280" fill="none" xmlns="http://www.w3.org/2000/svg" className={className}>
            <defs>
              <linearGradient id="z8Body" x1="0" y1="0" x2="300" y2="260">

                <stop offset="0%" stopColor="#1A1A1A"/>
                <stop offset="100%" stopColor="#050505"/>
              </linearGradient>
              <radialGradient id="lensGlassZ8" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#1E3A8A"/>
                <stop offset="70%" stopColor="#0F172A"/>
                <stop offset="100%" stopColor="#020617"/>
              </radialGradient>
              <linearGradient id="metalRingZ8" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stopColor="#D4D4D8"/>
                <stop offset="50%" stopColor="#71717A"/>
                <stop offset="100%" stopColor="#3F3F46"/>
              </linearGradient>
            </defs>
            <path d="M35,100 C35,70 45,65 70,65 L100,65 C108,65 112,58 116,48 L122,35 C126,26 135,22 150,22 C165,22 174,26 178,35 L184,48 C188,58 192,65 200,65 L230,65 C255,65 265,70 265,100 L265,200 C265,225 255,230 230,230 L70,230 C45,230 35,225 35,200 Z" fill="url(#z8Body)" stroke="#333" strokeWidth="2"/>
            <path d="M100,65 C108,65 112,58 116,48 L122,35 C126,26 135,22 150,22 C165,22 174,26 178,35 L184,48 C188,58 192,65 200,65 Z" fill="#141414" stroke="#333" strokeWidth="2"/>
            <path d="M35,100 C35,70 45,65 70,65 L90,65 L90,230 L70,230 C45,230 35,225 35,200 Z" fill="url(#z8Grip)" />
            <path d="M52,85 C46,110 46,130 52,150 L58,145 C53,125 53,105 58,88 Z" fill="#E60012" />
            <rect x="135" y="15" width="30" height="8" rx="2" fill="#0A0A0A" stroke="#222" strokeWidth="1"/>
            <text x="150" y="50" fill="#FFF" fontSize="14" fontWeight="bold" fontFamily="sans-serif" textAnchor="middle" letterSpacing="2">Nikon</text>
            <text x="228" y="95" fill="#FFF" fontSize="16" fontWeight="900" fontFamily="sans-serif" fontStyle="italic" letterSpacing="1">Z 8</text>
            <circle cx="235" cy="115" r="10" fill="#111" stroke="#333" strokeWidth="1.5" />
            <circle cx="235" cy="115" r="5" fill="#050505" />
            <circle cx="225" cy="155" r="8" fill="#1A1A1A" stroke="#444" strokeWidth="1.5" />
            <circle cx="225" cy="155" r="4" fill="#111" />
            <rect x="220" y="195" width="12" height="18" rx="3" fill="#1A1A1A" stroke="#333" strokeWidth="1.5" />
            <circle cx="150" cy="140" r="75" fill="#0A0A0A" stroke="#1A1A1A" strokeWidth="6"/>
            <circle cx="150" cy="140" r="62" fill="transparent" stroke="url(#metalRingZ8)" strokeWidth="8"/>
            <circle cx="150" cy="140" r="50" fill="#050505" stroke="#222" strokeWidth="2"/>
            <circle cx="150" cy="140" r="42" fill="url(#lensGlassZ8)" stroke="#000" strokeWidth="2"/>
            <path d="M115,110 C135,90 165,90 185,110" stroke="#60A5FA" strokeWidth="6" strokeLinecap="round" opacity="0.3"/>
            <path d="M125,160 C140,175 160,175 175,160" stroke="#93C5FD" strokeWidth="3" strokeLinecap="round" opacity="0.2"/>
            <circle cx="135" cy="125" r="12" fill="#93C5FD" opacity="0.2"/>
            <circle cx="165" cy="155" r="6" fill="#FFF" opacity="0.15"/>
          </svg>
        );

        const ZfDetailedSvg = ({ className }) => (
          <svg viewBox="0 -20 300 260" fill="none" xmlns="http://www.w3.org/2000/svg" className={className}>
            <defs>
              <linearGradient id="zfTop" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#2A2A2A"/>
                <stop offset="100%" stopColor="#111111"/>
              </linearGradient>
              <linearGradient id="zfDial" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor="#111"/>
                <stop offset="25%" stopColor="#444"/>
                <stop offset="50%" stopColor="#111"/>
                <stop offset="75%" stopColor="#444"/>
                <stop offset="100%" stopColor="#111"/>
              </linearGradient>
              <radialGradient id="lensGlassZf" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#451A03"/>
                <stop offset="70%" stopColor="#1C1917"/>
                <stop offset="100%" stopColor="#000000"/>
              </radialGradient>
            </defs>
            <g transform="matrix(0.85, 0, 0, 0.85, 22.5, 21)">
              <rect x="20" y="50" width="30" height="10" rx="2" fill="url(#brassDial)" stroke="#333" strokeWidth="1"/>
              <rect x="55" y="45" width="45" height="15" rx="3" fill="url(#brassDial)" stroke="#333" strokeWidth="1"/>
              <rect x="210" y="45" width="45" height="15" rx="3" fill="url(#brassDial)" stroke="#333" strokeWidth="1"/>
              <circle cx="77.5" cy="40" r="6" fill="#E5E7EB" stroke="#4B5563" strokeWidth="2"/> 
              <rect x="30" y="60" width="250" height="140" rx="6" fill="url(#zfBody)" stroke="#333" strokeWidth="2"/>
              <rect x="35" y="80" width="240" height="115" rx="4" fill="#0A0A0A" />
              <path d="M45 80 L60 80 L60 195 L45 195 Z" fill="#050505" /> 
              <path d="M110 60 L125 25 L175 25 L190 60 Z" fill="#1A1A1A" stroke="#444" strokeWidth="2"/>
              <path d="M125 25 L150 40 L175 25" stroke="#555" strokeWidth="2" fill="none"/>
              <rect x="135" y="15" width="30" height="8" rx="1" fill="#000"/>
              <text x="150" y="52" fill="#FFF" fontSize="14" fontWeight="bold" fontFamily="serif" textAnchor="middle" letterSpacing="1.5">Nikon</text>
              <circle cx="150" cy="130" r="65" fill="#050505" stroke="#222" strokeWidth="4"/>
              <circle cx="150" cy="130" r="55" fill="transparent" stroke="url(#brassDial)" strokeWidth="4"/>
              <circle cx="150" cy="130" r="40" fill="url(#lensGlassZf)" stroke="#000" strokeWidth="2"/>
              <path d="M125 105 Q150 90 170 110" stroke="#FBBF24" strokeWidth="4" strokeLinecap="round" opacity="0.4"/>
              <circle cx="140" cy="115" r="8" fill="#F59E0B" opacity="0.3"/>
              <text x="245" y="95" fill="#FFF" fontSize="18" fontWeight="bold" fontFamily="serif" fontStyle="italic">Z f</text>
            </g>
          </svg>
        );

        // --- 色調曲線平滑演算 (Catmull-Rom to Bezier) ---
        const catmullRom2bezier = (points) => {
          if (points.length < 2) return '';
          let d = `M ${points[0].x} ${points[0].y} `;
          for (let i = 0; i < points.length - 1; i++) {
            const p0 = i === 0 ? points[0] : points[i - 1];
            const p1 = points[i];
            const p2 = points[i + 1];
            const p3 = i + 2 < points.length ? points[i + 2] : p2;

            const cp1x = p1.x + (p2.x - p0.x) / 6;
            const cp1y = p1.y + (p2.y - p0.y) / 6;
            const cp2x = p2.x - (p3.x - p1.x) / 6;
            const cp2y = p2.y - (p3.y - p1.y) / 6;

            d += `C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y} `;
          }
          return d;
        };

        const ToneCurveGraph = ({ points }) => {
          const mappedPoints = points.map(p => ({ x: p.in, y: 255 - p.out }));
          const pathD = catmullRom2bezier(mappedPoints);

          return (
            <div className="relative w-full aspect-square bg-[#111111] rounded-lg border border-white/5 p-4 flex items-center justify-center">
              <svg viewBox="0 0 255 255" className="w-full h-full overflow-visible drop-shadow-[0_0_12px_rgba(255,225,0,0.2)]">
                {[64, 128, 192].map(val => (
                  <g key={val}>
                    <line x1={val} y1="0" x2={val} y2="255" stroke="rgba(255,255,255,0.08)" strokeWidth="1" />
                    <line x1="0" y1={val} x2="255" y2={val} stroke="rgba(255,255,255,0.08)" strokeWidth="1" />
                  </g>
                ))}
                <line x1="0" y1="255" x2="255" y2="0" stroke="rgba(255,255,255,0.15)" strokeWidth="1.5" strokeDasharray="4 4" />
                <path d={pathD} fill="none" stroke={NIKON_YELLOW} strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" />
                {mappedPoints.map((p, i) => (
                  <circle key={i} cx={p.x} cy={p.y} r="4.5" fill={NIKON_YELLOW} stroke="#111111" strokeWidth="2" />
                ))}
              </svg>
            </div>
          );
        };

        // --- 色彩分級：圖像化雷達與滑桿組件 ---
        const GradingColorWheel = ({ hue, saturation }) => {
          const angleRad = (hue - 90) * (Math.PI / 180); 
          const maxRadius = 38; 
          const radius = (saturation / 100) * maxRadius;
          const x = 50 + radius * Math.cos(angleRad);
          const y = 50 + radius * Math.sin(angleRad); 
          
          const markerColor = saturation > 0 ? `hsl(${hue}, 100%, 60%)` : '#666';

          return (
            <svg viewBox="0 0 100 100" className="w-24 h-24 drop-shadow-xl overflow-visible">
              <circle cx="50" cy="50" r="46" fill="#141414" stroke="#333" strokeWidth="2" />
              <circle cx="50" cy="50" r="15" fill="#222" opacity="0.5" />
              <line x1="50" y1="4" x2="50" y2="96" stroke="#333" strokeWidth="1" strokeDasharray="2 2" />
              <line x1="4" y1="50" x2="96" y2="50" stroke="#333" strokeWidth="1" strokeDasharray="2 2" />
              <circle cx="50" cy="50" r="2.5" fill="#555" />
              {saturation > 0 && <line x1="50" y1="50" x2={x} y2={y} stroke={markerColor} strokeWidth="1.5" opacity="0.6" />}
              <circle cx={x} cy={y} r="4.5" fill={markerColor} stroke="#000" strokeWidth="1.5" />
            </svg>
          );
        };

        const GradingLightness = ({ lightness }) => {
          const percentage = 50 - (lightness / 100) * 50;
          return (
            <div className="relative w-2.5 h-24 bg-[#141414] border border-[#333] rounded-full flex justify-center">
              <div className="absolute w-full h-[1px] bg-[#666] top-1/2" />
              <div
                className="absolute w-4 h-2.5 bg-zinc-300 rounded-sm border border-black shadow-sm z-10"
                style={{ top: `${percentage}%`, transform: 'translateY(-50%)' }}
              />
            </div>
          );
        };

        const GradingNode = ({ title, data }) => (
          <div className="bg-[#0A0A0A]/90 backdrop-blur-sm p-6 rounded-xl border border-white/10 hover:border-[#FFE100]/30 transition-colors flex flex-col items-center">
            <div className="text-xs tracking-widest text-white mb-6 border-b border-white/10 pb-3 uppercase w-full text-center">
              {title}
            </div>
            <div className="flex items-center gap-6 mb-8">
              <GradingColorWheel hue={data.h} saturation={data.s} />
              <GradingLightness lightness={data.l} />
            </div>
            <div className="flex w-full justify-between px-3">
              <div className="text-center">
                <div className="text-[10px] text-zinc-600 mb-1 font-mono">HUE</div>
                <div className="font-mono text-white text-sm">{data.h}°</div>
              </div>
              <div className="text-center">
                <div className="text-[10px] text-zinc-600 mb-1 font-mono">SAT</div>
                <div className="font-mono text-white text-sm">{data.s}</div>
              </div>
              <div className="text-center">
                <div className="text-[10px] text-zinc-600 mb-1 font-mono">LUM</div>
                <div className="font-mono text-white text-sm">{data.l}</div>
              </div>

                              </div>

                              <div className="bg-[#111111] p-8 rounded-xl border border-white/5 hover:border-[#FFE100]/30 transition-colors flex flex-col h-full">
                                <h4 className="text-white font-bold tracking-wide mb-2 flex items-center gap-2">🎞️ 保留環境氛圍</h4>
                                <div className="text-[#FFE100] font-mono text-xs mb-4 pb-4 border-b border-white/10">M-Y 軸: 0 / 亮度: +0.5</div>
                                <p className="text-xs text-zinc-500 leading-relaxed mb-6 flex-1">在夕陽暖光或強烈的環境色中，若不想破壞光線對膚色的真實渲染，只需單純提亮臉部立體感，維持電影感氛圍。</p>
                                <div className="mt-auto">
                                  <div className="text-[10px] text-zinc-600 uppercase tracking-widest mb-1.5">適用配方</div>
                                  <div className="text-xs text-zinc-400 font-mono">WarmCine, KamakuraCyan</div>
                                </div>
                              </div>

                              <div className="bg-[#111111] p-8 rounded-xl border border-white/5 hover:border-[#FFE100]/30 transition-colors flex flex-col h-full">
                                <h4 className="text-white font-bold tracking-wide mb-2 flex items-center gap-2">❄️ 冷調去黃校正</h4>
                                <div className="text-[#FFE100] font-mono text-xs mb-4 pb-4 border-b border-white/10">M-Y 軸: M +0.5 / 亮度: 0</div>
                                <p className="text-xs text-zinc-500 leading-relaxed mb-6 flex-1">在雪地或陰天等高色溫的冷藍色環境中，膚色容易顯得蠟黃。單純加入洋紅修正色偏，不額外提亮以免臉部死白。</p>
                                <div className="mt-auto">
                                  <div className="text-[10px] text-zinc-600 uppercase tracking-widest mb-1.5">適用配方</div>
                                  <div className="text-xs text-zinc-400 font-mono">BlueSky</div>
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ) : !activeProfile ? (
                    /* 預設首頁總覽 (Grid View) */
                    <div className="max-w-6xl mx-auto animate-in fade-in duration-500 pb-12">
                      <header className="mb-10 border-b border-white/10 pb-10 md:pr-80">
                        <h2 className="text-3xl md:text-5xl font-light text-white tracking-widest mb-4 uppercase">
                          Imaging <span className="font-black text-[#FFE100] italic">RECIPES</span>
                        </h2>
                        <p className="text-zinc-400 leading-relaxed max-w-2xl text-sm tracking-wide">
                          探索 9 款專為 Nikon Z 系列與 NX Studio 打造的專屬靈活色彩配方。從日系空氣感、極致黑白到電影青橙，選擇一個配方以查看完整的相機設定與參數。
                        </p>
                      </header>

                      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 relative z-10">
                        {profiles.map((profile) => (
                          <button
                            key={profile.id}
                            onClick={() => setActiveProfile(profile)}
                            className="group relative flex flex-col text-left p-6 md:p-8 bg-[#0A0A0A]/90 backdrop-blur-sm border border-white/10 rounded-xl transition-all duration-300 hover:-translate-y-1 hover:border-[#FFE100]/50 hover:bg-[#111111] shadow-lg hover:shadow-[#FFE100]/10"
                          >
                            <div className="absolute top-6 right-6 text-zinc-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                              <ChevronRight className="w-5 h-5 text-[#FFE100]" />
                            </div>
                            <div className="w-12 h-12 rounded-lg bg-[#141414] border border-white/5 flex items-center justify-center text-zinc-400 group-hover:text-[#FFE100] group-hover:border-[#FFE100]/30 transition-all duration-300 mb-5">
                              {profile.icon}
                            </div>
                            <h3 className="text-xl font-mono font-bold text-white mb-2 tracking-wide uppercase group-hover:text-[#FFE100] transition-colors break-words whitespace-normal">
                              {profile.name}
                            </h3>
                            <div className="text-xs font-medium text-[#FFE100] mb-3 tracking-widest">
                              {profile.style}
                            </div>
                            
                            {/* 首頁總覽卡片 - 適合場景標籤 */}
                            <div className="flex flex-wrap gap-1.5 mb-4">
                              {profile.scenes.map(scene => (
                                <span key={scene} className="text-[10px] px-2 py-0.5 rounded border border-white/10 bg-[#1A1A1A] text-zinc-400 group-hover:text-zinc-300 transition-colors">
                                  {scene}
                                </span>
                              ))}
                            </div>

                            <p className="text-sm text-zinc-500 leading-relaxed line-clamp-3 mt-auto group-hover:text-zinc-300 transition-colors">
                              {profile.desc}
                            </p>
                          </button>
                        ))}
                      </div>

                      <footer className="mt-16 pt-8 flex flex-col items-center gap-3">
                        <div className="text-[10px] text-zinc-600 tracking-widest uppercase">Philos Nikon Imaging Recipes</div>
                      </footer>
                    </div>
                  ) : (
                    /* 個別配方詳細頁面 */
                    <div className="max-w-5xl mx-auto animate-in fade-in duration-500 pb-12">
                      <header className="mb-12 border-b border-white/10 pb-10 md:pr-80 relative z-10">
                        <div className="flex items-center gap-4 mb-6 text-zinc-500">
                          {activeProfile.icon}
                          <span className="text-xs tracking-[0.2em] uppercase font-mono">{activeProfile.id}</span>
                        </div>
                        <h2 className="text-3xl md:text-5xl font-light text-white tracking-widest mb-4 font-mono uppercase break-words whitespace-normal">
                          {activeProfile.name}
                        </h2>
                        <h3 className="text-lg text-[#FFE100] font-medium mb-4 tracking-wide">{activeProfile.style}</h3>
                        
                        {/* 內頁 - 適合場景標籤 */}
                        <div className="flex flex-wrap gap-2 mb-6">
                          {activeProfile.scenes.map(scene => (
                            <span key={scene} className="text-xs px-2.5 py-1 rounded border border-white/10 bg-[#1A1A1A] text-zinc-300 tracking-widest">
                              {scene}
                            </span>
                          ))}
                        </div>

                        <p className="text-zinc-400 leading-relaxed max-w-3xl text-sm tracking-wide">
                          {activeProfile.desc}
                        </p>
                      </header>

                      {/* Camera Settings */}
                      <section className="mb-12 relative z-10">
                        <h4 className="text-sm font-medium text-white tracking-widest uppercase mb-6 flex items-center gap-3">
                          <span className="w-1.5 h-1.5 bg-white rounded-full"></span>
                          實戰機身設定
                        </h4>

                        <div className="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
                          <div className="bg-[#0A0A0A]/90 backdrop-blur-sm p-5 rounded-xl border border-white/10">
                            <div className="text-[10px] text-zinc-500 mb-2 tracking-widest uppercase">白平衡 (WB)</div>
                            <div className="font-medium text-white text-sm tracking-wide">{activeProfile.camera.wb}</div>
                          </div>
                          <div className="bg-[#0A0A0A]/90 backdrop-blur-sm p-5 rounded-xl border border-white/10">
                            <div className="text-[10px] text-zinc-500 mb-2 tracking-widest uppercase">測光模式</div>
                            <div className="font-medium text-white text-sm tracking-wide">{activeProfile.camera.metering}</div>
                          </div>
                          <div className="bg-[#0A0A0A]/90 backdrop-blur-sm p-5 rounded-xl border border-white/10">
                            <div className="text-[10px] text-zinc-500 mb-2 tracking-widest uppercase">主動式 D-Lighting</div>
                            <div className="font-medium text-white text-sm tracking-wide">{activeProfile.camera.adl}</div>
                          </div>
                          <div className="bg-[#0A0A0A]/90 backdrop-blur-sm p-5 rounded-xl border border-white/10">
                            <div className="text-[10px] text-zinc-500 mb-2 tracking-widest uppercase">曝光補償 (EV)</div>
                            <div className="font-medium text-[#FFE100] text-sm tracking-wide">{activeProfile.camera.ev}</div>
                          </div>
                          <div className="bg-[#0A0A0A]/90 backdrop-blur-sm p-5 rounded-xl border border-white/10">
                            <div className="text-[10px] text-zinc-500 mb-2 tracking-widest uppercase">人像印象平衡</div>
                            <div className="font-medium text-white text-sm tracking-wide">{activeProfile.camera.pib}</div>
                          </div>
                        </div>

                        {/* Dynamic Camera Tip Banner */}
                        {cameraMode !== 'general' && activeProfile.cameraTips[cameraMode] && (
                          <div className="relative flex flex-col md:flex-row rounded-xl border border-white/10 bg-[#0A0A0A]/90 backdrop-blur-sm overflow-hidden group hover:border-white/20 transition-colors">
                            <div className="relative z-10 flex gap-5 items-start p-6 md:w-3/4">
                              <div className="text-[#FFE100] shrink-0 mt-0.5">
                                {cameraMode === 'z8' ? <Zap className="w-5 h-5" /> : <Aperture className="w-5 h-5" />}
                              </div>
                              <div className="w-full">
                                <div className="text-xs font-bold text-white mb-2 tracking-widest uppercase flex items-center gap-3">
                                  <span className="uppercase">Nikon</span> <span className="flex items-center normal-case"><ZLogo className="w-3 h-3 mr-0.5" />{cameraMode === 'z8' ? '8' : 'f'}</span>
                                  <span className="text-[9px] px-2 py-0.5 rounded border border-[#FFE100]/50 text-[#FFE100] uppercase">Exclusive</span>
                                </div>
                                <div className="text-sm text-zinc-400 leading-relaxed md:pr-8 mb-4">
                                  {activeProfile.cameraTips[cameraMode]}
                                </div>

                                {/* Zf 限定：底片顆粒推薦設定 */}
                                {cameraMode === 'zf' && activeProfile.zfGrain && (
                                  <div className="inline-flex flex-wrap items-center gap-3 bg-[#111111] border border-[#FFE100]/30 px-3.5 py-2.5 rounded-lg shadow-sm">
                                    <div className="flex items-center gap-2 text-[#FFE100] border-r border-white/10 pr-3">
                                      <Film className="w-4 h-4" />
                                      <span className="text-[10px] font-bold tracking-widest uppercase">底片顆粒設定</span>
                                    </div>
                                    <div className="flex items-center gap-2 text-xs">
                                      <span className="text-zinc-500">顆粒量:</span>
                                      <span className={`font-medium ${activeProfile.zfGrain.amount === '關閉' ? 'text-zinc-500' : 'text-white'}`}>{activeProfile.zfGrain.amount}</span>
                                    </div>
                                    <div className="flex items-center gap-2 text-xs">
                                      <span className="text-zinc-500">粗細:</span>
                                      <span className={`font-medium ${activeProfile.zfGrain.size === '-' ? 'text-zinc-500' : 'text-white'}`}>{activeProfile.zfGrain.size}</span>
                                    </div>
                                  </div>
                                )}
                              </div>
                            </div>
                            <div className="hidden md:flex absolute right-0 top-0 bottom-0 w-1/3 items-center justify-end pr-8 pointer-events-none">
                              {cameraMode === 'z8' ? (
                                <Z8DetailedSvg className="w-32 md:w-48 drop-shadow-[0_10px_20px_rgba(0,0,0,0.5)] opacity-40 transition-opacity duration-300 group-hover:opacity-60" />
                              ) : (
                                <ZfDetailedSvg className="w-32 md:w-48 drop-shadow-[0_10px_20px_rgba(0,0,0,0.5)] opacity-40 transition-opacity duration-300 group-hover:opacity-60" />
                              )}
                            </div>
                          </div>
                        )}
                      </section>

                      {/* 核心參數區塊重構：曲線 與 色彩混合器 */}
                      <div className="grid grid-cols-1 xl:grid-cols-2 gap-8 mb-12 relative z-10">
                        {/* Tone Curve */}
                        <section className="flex flex-col">
                          <h4 className="text-sm font-medium text-white tracking-widest uppercase mb-6 flex items-center gap-3">
                            <span className="w-1.5 h-1.5 bg-[#FFE100] rounded-full"></span>
                            色調曲線
                          </h4>
                          <div className="bg-[#0A0A0A]/90 backdrop-blur-sm rounded-xl border border-white/10 p-6 md:p-10 flex-1 flex flex-col items-center justify-center hover:border-[#FFE100]/30 transition-colors">
                            <div className="w-full max-w-sm">
                              <ToneCurveGraph points={activeProfile.curve} />
                            </div>
                            <div className="mt-8 text-[10px] text-zinc-500 tracking-widest font-mono uppercase">Luma Curve Visualization</div>
                          </div>
                        </section>

                        {/* Color Blender */}
                        <section className="flex flex-col">
                          <h4 className="text-sm font-medium text-white tracking-widest uppercase mb-6 flex items-center gap-3">
                            <span className="w-1.5 h-1.5 bg-white rounded-full"></span>
                            色彩混合器
                          </h4>
                          <div className="bg-[#0A0A0A]/90 backdrop-blur-sm rounded-xl border border-white/10 p-6 flex-1 overflow-y-auto custom-scrollbar hover:border-[#FFE100]/30 transition-colors" style={{maxHeight: '450px'}}>
                            <div className="space-y-6">
                              {activeProfile.blender.map((c, i) => (
                                <div key={i} className="border-b border-white/5 pb-5 last:border-0 last:pb-0">
                                  <div className="flex items-center gap-2 mb-4">
                                    <div className="w-3 h-3 rounded-full shadow-[0_0_8px_rgba(255,255,255,0.2)]" style={{ backgroundColor: getColorCode(c.color) }} />
                                    <span className="text-sm font-medium text-zinc-200 tracking-wide">{c.color}</span>
                                  </div>
                                  <SliderRow label="色相 H" valStr={c.h} colorCode={getColorCode(c.color)} />
                                  <SliderRow label="飽和 S" valStr={c.s} colorCode={getColorCode(c.color)} />
                                  <SliderRow label="明亮 L" valStr={c.l} colorCode={getColorCode(c.color)} />
                                </div>
                              ))}
                            </div>
                          </div>
                        </section>
                      </div>

                      {/* Color Grading */}
                      <section className="mb-12 relative z-10">
                        <h4 className="text-sm font-medium text-white tracking-widest uppercase mb-6 flex items-center gap-3">
                          <span className="w-1.5 h-1.5 bg-[#FFE100] rounded-full"></span>
                          色彩分級
                        </h4>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                          <GradingNode title="陰影 Shadows" data={activeProfile.grading.shadow} />
                          <GradingNode title="中間調 Midtones" data={activeProfile.grading.mid} />
                          <GradingNode title="亮部 Highlights" data={activeProfile.grading.high} />
                        </div>

                        <div className="flex flex-col sm:flex-row gap-4 mt-6">
                          <GradingSlider label="混合 Blending" valueStr={activeProfile.grading.blend} min={0} max={100} />
                          <GradingSlider label="平衡 Balance" valueStr={activeProfile.grading.balance} min={-100} max={100} />
                        </div>
                      </section>

                      {/* Details & Sharpening */}
                      <section className="mb-10 relative z-10">
                        <h4 className="text-sm font-medium text-white tracking-widest uppercase mb-6 flex items-center gap-3">
                          <span className="w-1.5 h-1.5 bg-white rounded-full"></span>
                          銳化與細節 <span className="text-zinc-600 font-mono text-[10px]">(-5.0 ~ 5.0)</span>
                        </h4>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                          <div className="bg-[#0A0A0A]/90 backdrop-blur-sm p-6 rounded-xl border border-white/10 text-center hover:border-[#FFE100]/30 transition-colors">
                            <div className="text-[10px] text-zinc-500 mb-3 tracking-widest uppercase">清晰度</div>
                            <div className={`font-mono text-xl ${activeProfile.details.clarity.includes('-') ? 'text-zinc-400' : activeProfile.details.clarity === '0.00' ? 'text-zinc-600' : 'text-white'}`}>
                              {activeProfile.details.clarity}
                            </div>
                          </div>
                          <div className="bg-[#0A0A0A]/90 backdrop-blur-sm p-6 rounded-xl border border-white/10 text-center hover:border-[#FFE100]/30 transition-colors">
                            <div className="text-[10px] text-zinc-500 mb-3 tracking-widest uppercase">中範圍銳化</div>
                            <div className={`font-mono text-xl ${activeProfile.details.mid.includes('-') ? 'text-zinc-400' : activeProfile.details.mid === '0.00' ? 'text-zinc-600' : 'text-white'}`}>
                              {activeProfile.details.mid}
                            </div>
                          </div>
                          <div className="bg-[#0A0A0A]/90 backdrop-blur-sm p-6 rounded-xl border border-white/10 text-center hover:border-[#FFE100]/30 transition-colors">
                            <div className="text-[10px] text-zinc-500 mb-3 tracking-widest uppercase">銳化</div>
                            <div className={`font-mono text-xl ${activeProfile.details.sharp.includes('-') ? 'text-zinc-400' : activeProfile.details.sharp === '0.00' ? 'text-zinc-600' : 'text-white'}`}>
                              {activeProfile.details.sharp}
                            </div>
                          </div>
                          <div className="bg-[#0A0A0A]/90 backdrop-blur-sm p-6 rounded-xl border border-white/10 text-center hover:border-[#FFE100]/30 transition-colors">
                            <div className="text-[10px] text-zinc-500 mb-3 tracking-widest uppercase">快速銳化</div>
                            <div className="font-mono text-xl text-zinc-600">
                              {activeProfile.details.quick}
                            </div>
                          </div>
                        </div>
                      </section>

                      {activeProfile.extra && (
                        <div className="bg-[#111]/90 backdrop-blur-sm border border-[#FFE100]/30 p-5 rounded-xl text-sm text-zinc-300 flex items-start gap-4 relative z-10">
                          <Info className="w-5 h-5 shrink-0 mt-0.5 text-[#FFE100]" />
                          <p className="leading-relaxed tracking-wide">{activeProfile.extra}</p>
                        </div>
                      )}

                      <footer className="mt-20 pt-8 border-t border-white/10 flex flex-col items-center gap-3 relative z-10">
                        <div className="text-[10px] text-zinc-600 tracking-widest uppercase">Philos Nikon Imaging Recipes</div>
                        <div className="text-[9px] text-zinc-700 tracking-widest uppercase">Optimized for Z-Series</div>
                      </footer>
                    </div>
                  )}
                </div>
              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
